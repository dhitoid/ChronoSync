<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ChronoSync</title>
    
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ec4899;
            --bg-dark: #0f0c29;
            --bg-mid: #302b63;
            --bg-light: #24243e;
            --surface: rgba(255, 255, 255, 0.08);
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-mid), var(--bg-light));
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%; max-width: 430px;
            padding: 30px 20px 100px 20px; /* Padding bawah untuk tombol FAB */
            box-sizing: border-box;
            position: relative;
        }

        .header h1 {
            margin: 0; font-size: 2.5rem; font-weight: 800;
            background: -webkit-linear-gradient(45deg, var(--secondary), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: rgba(255,255,255,0.6); margin: 5px 0 25px 0; }

        .btn-permission {
            width: 100%; background: rgba(236, 72, 153, 0.15);
            border: 1px solid var(--secondary); color: white;
            padding: 14px; border-radius: 16px; font-weight: bold;
            margin-bottom: 20px; display: none; cursor: pointer;
        }

        .task-list-header {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 15px;
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }

        .task-item {
            background: var(--surface); border-radius: 16px; padding: 16px;
            margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
            border-left: 4px solid var(--primary);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .task-info .task-name { font-weight: 600; font-size: 1.05rem; display: block;}
        .task-info .task-time { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 5px; display: block;}

        .delete-btn {
            background: rgba(239, 68, 68, 0.2); color: #ef4444; border: none;
            border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.2rem;
        }

        /* Floating Action Button (FAB) */
        .fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 64px; height: 64px; border-radius: 32px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 2rem; box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            cursor: pointer; z-index: 100; transition: transform 0.2s;
        }
        .fab:active { transform: translateX(-50%) scale(0.9); }

        /* Bottom Sheet (Modal Form) */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 430px; background: #1a1a2e;
            border-radius: 30px 30px 0 0; padding: 30px 20px; box-sizing: border-box;
            z-index: 201; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .bottom-sheet.active { bottom: 0; }

        .sheet-handle {
            width: 40px; height: 5px; background: rgba(255,255,255,0.2);
            border-radius: 5px; margin: 0 auto 20px auto;
        }

        input {
            width: 100%; padding: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
            color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; outline: none;
        }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; }
        
        .btn-save {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: var(--primary); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        /* Toast */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #121212; padding: 12px 24px;
            border-radius: 30px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: top 0.4s; z-index: 1000;
        }
        #toast.show { top: 40px; }
    </style>
</head>
<body>

    <div id="toast"><span id="toast-msg">Pesan</span></div>

    <div class="app-container">
        <div class="header">
            <h1>ChronoSync</h1>
            <p>Sistem Asisten Pintar Berjalan</p>
        </div>

        <button id="perm-btn" class="btn-permission" onclick="requestPermission()">🔔 Izin Notifikasi Diperlukan</button>

        <div class="task-list-header">
            <span>Jadwal Aktif</span>
            <span id="task-count" style="color: var(--primary);">0</span>
        </div>

        <div id="task-list"></div>
    </div>

    <!-- Tombol Melayang -->
    <button class="fab" onclick="toggleSheet()">+</button>

    <!-- Menu Meluncur dari Bawah -->
    <div class="bottom-sheet-overlay" id="overlay" onclick="toggleSheet()"></div>
    <div class="bottom-sheet" id="sheet">
        <div class="sheet-handle"></div>
        <h2 style="margin-top:0;">Buat Jadwal</h2>
        <input type="text" id="task-name" placeholder="Makan siang, rapat..." autocomplete="off">
        <input type="time" id="task-time" required>
        <button class="btn-save" onclick="addTask()">Simpan Jadwal</button>
    </div>

    <script>
        const taskNameInput = document.getElementById('task-name');
        const taskTimeInput = document.getElementById('task-time');
        const taskListContainer = document.getElementById('task-list');
        const permBtn = document.getElementById('perm-btn');
        const toast = document.getElementById('toast');
        const overlay = document.getElementById('overlay');
        const sheet = document.getElementById('sheet');
        
        let swRegistration = null;

        // --- REGISTRASI SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                swRegistration = reg;
                syncTasksToSW(); // Kirim data awal ke SW saat web dibuka
            });

            // Dengarkan perintah dari Service Worker untuk update UI
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'UPDATE_UI') {
                    loadTasks(); 
                }
            });
        }

        // --- PERIZINAN NOTIFIKASI ---
        if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            permBtn.style.display = 'block';
        }

        function requestPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    showToast("✅ Notifikasi aktif!");
                    permBtn.style.display = 'none';
                }
            });
        }

        // --- UI INTERACTION ---
        function toggleSheet() {
            overlay.classList.toggle('active');
            sheet.classList.toggle('active');
            if(sheet.classList.contains('active')) taskNameInput.focus();
        }

        function showToast(message) {
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- LOGIKA DATA ---
        function syncTasksToSW() {
            let tasks = JSON.parse(localStorage.getItem('chronotasks')) || [];
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'SYNC_TASKS',
                    tasks: tasks
                });
            }
        }

        function addTask() {
            const name = taskNameInput.value.trim();
            const time = taskTimeInput.value;
            if (!name || !time) { showToast("⚠️ Isi lengkap!"); return; }

            let tasks = JSON.parse(localStorage.getItem('chronotasks')) || [];
            tasks.push({ name, time, notified: false });
            localStorage.setItem('chronotasks', JSON.stringify(tasks));

            taskNameInput.value = ''; taskTimeInput.value = '';
            toggleSheet();
            showToast("✅ Jadwal disimpan!");
            
            loadTasks();
            syncTasksToSW(); // Kirim data baru ke background
        }

        function deleteTask(index) {
            let tasks = JSON.parse(localStorage.getItem('chronotasks')) || [];
            tasks.splice(index, 1);
            localStorage.setItem('chronotasks', JSON.stringify(tasks));
            
            loadTasks();
            syncTasksToSW(); // Update data di background
        }

        function loadTasks() {
            let tasks = JSON.parse(localStorage.getItem('chronotasks')) || [];
            taskListContainer.innerHTML = '';
            document.getElementById('task-count').innerText = tasks.length;

            if (tasks.length === 0) {
                taskListContainer.innerHTML = `<p style="text-align:center; color:rgba(255,255,255,0.4); margin-top:40px;">Belum ada jadwal. Tekan tombol + di bawah.</p>`;
                return;
            }

            tasks.sort((a, b) => a.time.localeCompare(b.time)).forEach((task, index) => {
                const opacity = task.notified ? '0.5' : '1'; 
                taskListContainer.innerHTML += `
                    <div class="task-item" style="opacity: ${opacity}">
                        <div class="task-info">
                            <span class="task-name">${task.name}</span>
                            <span class="task-time">⏰ ${task.time} ${task.notified ? '• Selesai' : ''}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
                    </div>
                `;
            });
        }

        loadTasks();
    </script>
</body>
</html>
